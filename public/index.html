<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vueform Builder</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vueform/vueform@latest/themes/default.css" />
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <style>
      body { font-family: Inter, Arial, sans-serif; margin: 0; background: #f8fafc; color: #111827; }
      .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
      .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 2px rgba(15, 23, 42, .08); padding: 1rem; }
      .header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1rem; }
      .token-row { display: flex; gap: .5rem; margin-bottom: 1rem; }
      .token-row input { flex: 1; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; border-bottom: 1px solid #e5e7eb; padding: .6rem; }
      .actions { display: flex; gap: .4rem; }
      input, textarea, select, button { font: inherit; padding: .5rem .7rem; border: 1px solid #d1d5db; border-radius: 8px; }
      textarea { width: 100%; min-height: 320px; resize: vertical; }
      button { background: #2563eb; color: #fff; border: none; cursor: pointer; }
      button.secondary { background: #fff; color: #111827; border: 1px solid #d1d5db; }
      button.danger { background: #dc2626; }
      .meta { color: #6b7280; font-size: .9rem; }
      .error { color: #b91c1c; margin-top: .7rem; }
      .empty { padding: 1rem; text-align: center; color: #6b7280; }
      .field { margin-bottom: .8rem; }
      .field label { display: block; margin-bottom: .3rem; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="app" class="container"></div>
    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            token: localStorage.getItem('authToken') || '',
            forms: [],
            message: '',
            error: '',
            view: 'list',
            editorMode: 'create',
            editingId: null,
            description: '',
            groupId: '',
            editorVersion: 1,
            formJson: '{\n  "name": "new-form",\n  "elements": []\n}'
          };
        },
        methods: {
          setError(message) {
            this.error = message || '';
          },
          setMessage(message) {
            this.message = message || '';
          },
          async request(path, options = {}) {
            if (!this.token) {
              throw new Error('Please provide a bearer token.');
            }
            const response = await fetch(path, {
              ...options,
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + this.token,
                ...(options.headers || {})
              }
            });
            if (!response.ok) {
              const payload = await response.json().catch(() => ({}));
              throw new Error(payload.message || `Request failed (${response.status})`);
            }
            if (response.status === 204) {
              return null;
            }
            return response.json();
          },
          async loadForms() {
            this.setError('');
            this.setMessage('');
            try {
              localStorage.setItem('authToken', this.token);
              const payload = await this.request('/api/forms');
              this.forms = payload.forms || [];
              this.setMessage(payload.message || '');
            } catch (error) {
              this.forms = [];
              this.setError(error.message);
            }
          },
          openCreate() {
            this.editorMode = 'create';
            this.editingId = null;
            this.description = '';
            this.groupId = '';
            this.editorVersion = 1;
            this.formJson = '{\n  "name": "new-form",\n  "elements": []\n}';
            this.view = 'builder';
            this.setError('');
          },
          openEdit(form) {
            this.editorMode = 'edit';
            this.editingId = form.id;
            this.description = form.description || '';
            this.groupId = form.groupId || '';
            this.editorVersion = Number(form.version || 0) + 1;
            this.formJson = JSON.stringify(form.form || {}, null, 2);
            this.view = 'builder';
            this.setError('');
          },
          cancelEdit() {
            this.view = 'list';
            this.setError('');
            this.loadForms();
          },
          async saveForm() {
            this.setError('');
            let form;
            try {
              form = JSON.parse(this.formJson);
            } catch (_error) {
              this.setError('Form JSON is invalid.');
              return;
            }
            const versionRemark = window.prompt('Enter version remark');
            if (versionRemark === null) {
              return;
            }
            if (!versionRemark.trim()) {
              this.setError('Version remark is required.');
              return;
            }
            try {
              const payload = {
                description: this.description,
                versionRemark,
                form
              };
              if (this.editorMode === 'create' && this.groupId.trim()) {
                payload.groupId = this.groupId.trim();
              }
              if (this.editorMode === 'create') {
                await this.request('/api/forms', { method: 'POST', body: JSON.stringify(payload) });
              } else {
                await this.request(`/api/forms/${this.editingId}`, { method: 'PUT', body: JSON.stringify(payload) });
              }
              this.view = 'list';
              await this.loadForms();
            } catch (error) {
              this.setError(error.message);
            }
          },
          async deleteForm(form) {
            if (!window.confirm(`Delete form "${form.description || form.id}"?`)) {
              return;
            }
            this.setError('');
            try {
              await this.request(`/api/forms/${form.id}`, { method: 'DELETE' });
              await this.loadForms();
            } catch (error) {
              this.setError(error.message);
            }
          }
        },
        mounted() {
          if (this.token) {
            this.loadForms();
          }
        },
        template: `
          <div class="card" v-if="view === 'list'">
            <div class="header">
              <h2>Available forms</h2>
              <button @click="openCreate">Create new form</button>
            </div>
            <div class="token-row">
              <input v-model="token" type="password" placeholder="******" />
              <button class="secondary" @click="loadForms">Load forms</button>
            </div>
            <p class="meta" v-if="message">{{ message }}</p>
            <div class="error" v-if="error">{{ error }}</div>
            <table v-if="forms.length">
              <thead>
                <tr>
                  <th>Description</th>
                  <th>Group</th>
                  <th>Version</th>
                  <th>Remark</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="form in forms" :key="form.id">
                  <td>{{ form.description }}</td>
                  <td>{{ form.groupId }}</td>
                  <td>{{ form.version }}</td>
                  <td>{{ form.versionRemark }}</td>
                  <td>
                    <div class="actions">
                      <button class="secondary" @click="openEdit(form)">Edit</button>
                      <button class="danger" @click="deleteForm(form)">Delete</button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
            <div class="empty" v-else>No forms available.</div>
          </div>
          <div class="card" v-else>
            <div class="header">
              <h2>Vueform builder</h2>
              <div class="meta">New version: {{ editorVersion }}</div>
            </div>
            <div class="field">
              <label>Description</label>
              <input v-model="description" placeholder="Form description" />
            </div>
            <div class="field" v-if="editorMode === 'create'">
              <label>Group ID (required if you have multiple groups)</label>
              <input v-model="groupId" placeholder="Group id" />
            </div>
            <div class="field">
              <label>Form JSON</label>
              <textarea v-model="formJson"></textarea>
            </div>
            <div class="actions">
              <button @click="saveForm">Save</button>
              <button class="secondary" @click="cancelEdit">Cancel</button>
            </div>
            <div class="error" v-if="error">{{ error }}</div>
          </div>
        `
      }).mount('#app');
    </script>
  </body>
</html>
